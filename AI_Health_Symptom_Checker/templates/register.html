{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 form-card">
        <h2 class="text-center mb-4">Create Account</h2>
        <form method="POST">
            <div class="mb-3"><label class="form-label">Username</label>
                <input name="username" type="text" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Email</label>
                <input name="email" type="email" class="form-control" required></div>
            <div class="mb-3"><label class="form-label">Password</label>
                <input name="password" type="password" class="form-control" required></div>
            <button class="btn btn-success w-100">Register</button>
            <p class="text-center mt-3">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
        </form>
    </div>
</div>
{% endblock %}
